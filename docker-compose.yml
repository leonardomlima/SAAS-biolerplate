services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saas_db
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    ports: ["6379:6379"]
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8000:8000"]
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: bash -lc "cd backend && poetry run celery -A app.background.tasks.celery_app worker -l info"
    env_file: .env.example
    depends_on: [backend]
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: bash -lc "cd backend && poetry run celery -A app.background.tasks.celery_app beat -l info"
    env_file: .env.example
    depends_on: [backend]
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports: ["5173:5173"]
    depends_on: [backend]
